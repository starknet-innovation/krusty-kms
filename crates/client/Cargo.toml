[package]
name = "krusty-kms-client"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Starknet RPC client for interacting with TONGO contracts"
# Cannot publish: `account_sdk` (controller feature) is a git-only dependency
# with no crates.io release.
publish = false

[dependencies]
krusty-kms-common = { path = "../common" }
krusty-kms = { path = "../kms" }
krusty-kms-sdk = { path = "../sdk" }
krusty-kms-crypto = { path = "../crypto" }
starknet-types-core.workspace = true
starknet-rust = "0.18.0"
tokio = { workspace = true, features = ["time", "sync"] }
serde.workspace = true
serde_json.workspace = true
hex.workspace = true
thiserror.workspace = true
url = "2.5"
async-trait.workspace = true

# Optional: Cartridge Controller SDK
account_sdk = { git = "https://github.com/cartridge-gg/controller-rs.git", tag = "v0.9.4", optional = true }
starknet = { version = "0.17.0", optional = true }

[features]
default = []
controller = ["dep:account_sdk", "dep:starknet"]

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
