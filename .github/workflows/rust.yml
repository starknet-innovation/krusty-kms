name: Rust

on:
  push:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check -p krusty-kms --examples --locked
      - run: cargo check -p krusty-kms-sdk --examples --locked
      - run: cargo test --workspace --exclude krusty-kms-wasm

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
      - run: cargo check --all-targets --locked
      - run: cargo check -p krusty-kms --examples --locked
      - run: cargo check -p krusty-kms-sdk --examples --locked

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Package publishable workspace crates
        run: >
          cargo package --locked --workspace
          --exclude krusty-kms-oracle
          --exclude krusty-kms-wasm
          --exclude krusty-kms-controller
          --exclude krusty-kms-cabi
          --exclude mental-poker
          --exclude mental-poker-wasm
          --exclude qb-game

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: rustup target add wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack test --node crates/wasm

  version-bump:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bump for changed crates
        run: |
          CRATES=("common" "wallet-api" "domain" "gateway" "crypto" "kms" "sdk" "client")
          FAILED=0
          for crate in "${CRATES[@]}"; do
            # Check if source files in this crate changed vs the base branch
            if git diff --name-only origin/${{ github.base_ref }}...HEAD -- "crates/$crate/src/" | grep -q .; then
              # Source changed — check if Cargo.toml version also changed
              if ! git diff origin/${{ github.base_ref }}...HEAD -- "crates/$crate/Cargo.toml" | grep -q '^+version'; then
                # Version is workspace-inherited, so check root Cargo.toml
                if ! git diff origin/${{ github.base_ref }}...HEAD -- "Cargo.toml" | grep -q '^+version'; then
                  echo "::error::crates/$crate/src/ changed but workspace version was not bumped"
                  FAILED=1
                fi
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Bump the version in Cargo.toml [workspace.package] before merging"
            exit 1
          fi
