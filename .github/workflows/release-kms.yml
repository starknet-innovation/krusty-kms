name: Release KMS

on:
  workflow_dispatch:
  push:
    tags:
      - "kms-v*"

jobs:
  native-libs:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
          - os: ubuntu-latest
            target: aarch64-linux-gnu
          - os: macos-14
            target: aarch64-macos
          - os: macos-13
            target: x86_64-macos
          - os: windows-latest
            target: x86_64-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build native library
        run: zig build --build-file zig/build.zig -Dtarget=${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kms-${{ matrix.target }}
          path: zig/zig-out/lib/*

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build wasm artifact (placeholder)
        run: |
          echo "TODO: add zig wasm export target for packages/kms-ts"

  publish:
    needs: [native-libs, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Publish placeholders
        run: |
          echo "TODO: publish npm, PyPI, crates.io, Swift tag, Go module, Maven Central"
