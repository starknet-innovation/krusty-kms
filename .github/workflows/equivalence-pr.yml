name: Rust-Zig Equivalence PR

on:
  pull_request:
    paths:
      - "tools/equivalence-harness/**"
      - "tools/rust-oracle/**"
      - "tools/zig-oracle/**"
      - "fixtures/vectors/parity/**"
      - "crates/core/**"
      - "zig/src/**"
      - ".github/workflows/equivalence-pr.yml"
  push:
    paths:
      - "tools/equivalence-harness/**"
      - "tools/rust-oracle/**"
      - "tools/zig-oracle/**"
      - "fixtures/vectors/parity/**"
      - "crates/core/**"
      - "zig/src/**"
      - ".github/workflows/equivalence-pr.yml"

jobs:
  vectors:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build rust oracle
        run: cargo build --manifest-path tools/rust-oracle/Cargo.toml
      - name: Build zig oracle
        run: zig build-exe --dep kms_zig -Mmain=tools/zig-oracle/main.zig -Mkms_zig=zig/src/root.zig -O ReleaseFast -femit-bin=tools/zig-oracle/zig-oracle
      - name: Build harness
        run: cargo build --manifest-path tools/equivalence-harness/Cargo.toml
      - name: Run vector parity
        run: |
          EXT=""
          if [[ "${{ matrix.os }}" == windows-latest ]]; then EXT=".exe"; fi
          cargo run --manifest-path tools/equivalence-harness/Cargo.toml -- \
            --rust-bin tools/rust-oracle/target/debug/rust-oracle${EXT} \
            --zig-bin tools/zig-oracle/zig-oracle${EXT} \
            --vectors fixtures/vectors/parity/core-vectors.json \
            --mode vectors \
            --artifacts-dir tools/equivalence-harness/artifacts \
            --fail-fast true
      - name: Upload mismatch artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-mismatch-${{ matrix.os }}
          path: tools/equivalence-harness/artifacts/*.json

  random-pr:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build rust oracle
        run: cargo build --manifest-path tools/rust-oracle/Cargo.toml
      - name: Build zig oracle
        run: zig build-exe --dep kms_zig -Mmain=tools/zig-oracle/main.zig -Mkms_zig=zig/src/root.zig -O ReleaseFast -femit-bin=tools/zig-oracle/zig-oracle
      - name: Run randomized parity (PR profile)
        run: |
          cargo run --manifest-path tools/equivalence-harness/Cargo.toml -- \
            --rust-bin tools/rust-oracle/target/debug/rust-oracle \
            --zig-bin tools/zig-oracle/zig-oracle \
            --vectors fixtures/vectors/parity/core-vectors.json \
            --mode random-pr \
            --random-cases 128 \
            --seed 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f \
            --artifacts-dir tools/equivalence-harness/artifacts \
            --fail-fast true
      - name: Upload mismatch artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-random-pr
          path: tools/equivalence-harness/artifacts/*.json
