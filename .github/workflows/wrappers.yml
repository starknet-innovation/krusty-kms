name: Wrappers

on:
  push:
    paths:
      - "packages/**"
      - ".github/workflows/wrappers.yml"
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/wrappers.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      jvm: ${{ steps.filter.outputs.jvm }}
      dart: ${{ steps.filter.outputs.dart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            swift:
              - 'packages/kms-swift/**'
              - 'packages/kms-c/**'
            jvm:
              - 'packages/kms-jvm/**'
              - 'packages/kms-c/**'
            dart:
              - 'packages/kms-dart/**'
              - 'packages/kms-c/**'

  swift:
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/kms-swift
    steps:
      - uses: actions/checkout@v4
      - run: swift build

  jvm:
    needs: changes
    if: needs.changes.outputs.jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-jvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10"
      - run: gradle classes

  dart:
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-dart
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze
      - run: dart test
