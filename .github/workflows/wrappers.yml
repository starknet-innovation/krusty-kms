name: Wrappers

on:
  push:
    paths:
      - "packages/**"
      - ".github/workflows/wrappers.yml"
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/wrappers.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      py: ${{ steps.filter.outputs.py }}
      rs: ${{ steps.filter.outputs.rs }}
      go: ${{ steps.filter.outputs.go }}
      swift: ${{ steps.filter.outputs.swift }}
      jvm: ${{ steps.filter.outputs.jvm }}
      dart: ${{ steps.filter.outputs.dart }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ts:
              - 'packages/kms-ts/**'
              - 'packages/kms-c/**'
            py:
              - 'packages/kms-py/**'
              - 'packages/kms-c/**'
            rs:
              - 'packages/kms-rs/**'
              - 'packages/kms-c/**'
            go:
              - 'packages/kms-go/**'
              - 'packages/kms-c/**'
            swift:
              - 'packages/kms-swift/**'
              - 'packages/kms-c/**'
            jvm:
              - 'packages/kms-jvm/**'
              - 'packages/kms-c/**'
            dart:
              - 'packages/kms-dart/**'
              - 'packages/kms-c/**'

  ts:
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck

  py:
    needs: changes
    if: needs.changes.outputs.py == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m compileall src

  rs:
    needs: changes
    if: needs.changes.outputs.rs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test ./...

  swift:
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/kms-swift
    steps:
      - uses: actions/checkout@v4
      - run: swift build

  jvm:
    needs: changes
    if: needs.changes.outputs.jvm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-jvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.10"
      - run: gradle classes

  dart:
    needs: changes
    if: needs.changes.outputs.dart == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kms-dart
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze
      - run: dart test
