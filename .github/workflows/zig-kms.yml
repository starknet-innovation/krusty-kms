name: Zig KMS Core

on:
  push:
    paths:
      - "zig/**"
      - "fixtures/vectors/**"
      - "tools/rust-oracle/**"
      - ".github/workflows/zig-kms.yml"
  pull_request:
    paths:
      - "zig/**"
      - "fixtures/vectors/**"
      - "tools/rust-oracle/**"
      - ".github/workflows/zig-kms.yml"

jobs:
  zig-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build and test Zig core
        run: zig build --build-file zig/build.zig test
      - name: Build native artifacts
        run: zig build --build-file zig/build.zig
      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: zig-kms-native
          path: zig/zig-out/lib/*

  rust-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rust oracle
        run: cargo run --manifest-path tools/rust-oracle/Cargo.toml -- coin-types
