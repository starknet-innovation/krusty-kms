name: Publish to crates.io

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "!crates/ffi/**"
      - "!crates/experimental/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish krusty-kms-common
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="krusty-kms-common") | .version')
          if cargo search krusty-kms-common --limit 1 | grep -q "\"$VERSION\""; then
            echo "krusty-kms-common@$VERSION already published, skipping"
          else
            cargo publish -p krusty-kms-common --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Publish krusty-kms-crypto
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="krusty-kms-crypto") | .version')
          if cargo search krusty-kms-crypto --limit 1 | grep -q "\"$VERSION\""; then
            echo "krusty-kms-crypto@$VERSION already published, skipping"
          else
            cargo publish -p krusty-kms-crypto --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Publish krusty-kms
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="krusty-kms") | .version')
          if cargo search krusty-kms --limit 1 | grep -q "\"$VERSION\""; then
            echo "krusty-kms@$VERSION already published, skipping"
          else
            cargo publish -p krusty-kms --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Publish krusty-kms-sdk
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="krusty-kms-sdk") | .version')
          if cargo search krusty-kms-sdk --limit 1 | grep -q "\"$VERSION\""; then
            echo "krusty-kms-sdk@$VERSION already published, skipping"
          else
            cargo publish -p krusty-kms-sdk --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Publish krusty-kms-client
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="krusty-kms-client") | .version')
          if cargo search krusty-kms-client --limit 1 | grep -q "\"$VERSION\""; then
            echo "krusty-kms-client@$VERSION already published, skipping"
          else
            cargo publish -p krusty-kms-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
      - name: Publish krusty-kms-wasm
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="krusty-kms-wasm") | .version')
          if cargo search krusty-kms-wasm --limit 1 | grep -q "\"$VERSION\""; then
            echo "krusty-kms-wasm@$VERSION already published, skipping"
          else
            cargo publish -p krusty-kms-wasm --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
