name: Rust-Zig Equivalence Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build rust oracle
        run: cargo build --manifest-path tools/rust-oracle/Cargo.toml
      - name: Build zig oracle
        run: zig build-exe --dep kms_zig -Mmain=tools/zig-oracle/main.zig -Mkms_zig=zig/src/root.zig -O ReleaseFast -femit-bin=tools/zig-oracle/zig-oracle
      - name: Run vector parity
        run: |
          EXT=""
          if [[ "${{ matrix.os }}" == windows-latest ]]; then EXT=".exe"; fi
          cargo run --manifest-path tools/equivalence-harness/Cargo.toml -- \
            --rust-bin tools/rust-oracle/target/debug/rust-oracle${EXT} \
            --zig-bin tools/zig-oracle/zig-oracle${EXT} \
            --vectors fixtures/vectors/parity/core-vectors.json \
            --mode vectors \
            --artifacts-dir tools/equivalence-harness/artifacts \
            --fail-fast true
      - name: Run randomized parity (nightly profile)
        run: |
          EXT=""
          if [[ "${{ matrix.os }}" == windows-latest ]]; then EXT=".exe"; fi
          cargo run --manifest-path tools/equivalence-harness/Cargo.toml -- \
            --rust-bin tools/rust-oracle/target/debug/rust-oracle${EXT} \
            --zig-bin tools/zig-oracle/zig-oracle${EXT} \
            --vectors fixtures/vectors/parity/core-vectors.json \
            --mode random-nightly \
            --random-cases 1024 \
            --seed 1f1e1d1c1b1a191817161514131211100f0e0d0c0b0a09080706050403020100 \
            --artifacts-dir tools/equivalence-harness/artifacts \
            --fail-fast false
      - name: Upload mismatch artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parity-nightly-${{ matrix.os }}
          path: tools/equivalence-harness/artifacts/*.json
