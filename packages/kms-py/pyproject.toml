[project]
name = "krusty-kms"
version = "0.1.0"
description = "Python ctypes wrapper for Krusty KMS"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Krusty KMS Contributors" }]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
