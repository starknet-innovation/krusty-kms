    "RUSTSEC-2024-0436", # paste      – unmaintained (via ark-ff → ruint → alloy-primitives)
    "RUSTSEC-2024-0370", # proc-macro-error – unmaintained (via cainome-rs-macro)
    "RUSTSEC-2025-0134", # rustls-pemfile   – unmaintained (via reqwest 0.11)
    "RUSTSEC-2025-0048", # tsify-next       – unmaintained (direct dep of account_sdk)
]
